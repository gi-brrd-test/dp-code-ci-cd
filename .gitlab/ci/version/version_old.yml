version:
  stage: version
  before_script:
    
    - echo "Deploying the project..."
    - apk update && apk add --no-cache python3 py3-pip git curl bash
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - echo ${PATH_AUTOMATION_DEPLOYMENT}
    - git clone -b "main" git@gitlab.com:${PATH_AUTOMATION_DEPLOYMENT}.git /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})
    - git config --global --add safe.directory '*'
    - git remote set-url origin ${PRIVATE_ACCESS_REPO}
    - git checkout ${REPO_BRANCH_NAME}
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git config --global user.name "$GITLAB_USER_NAME"
  script:
    - pip3 install --break-system-packages -r /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/.gitlab/ci/version/requirements.txt 
    - python3 /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/.gitlab/ci/version/increment_version_script.py "${FILE_VERSION}" "dev" "${PROJECT_TYPE}"
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env
  only:
    variables:
    - $CI_COMMIT_BRANCH == "main"
  tags:    
    - aks-runner    
