version:
  stage: version
  image: "registry.gitlab.com/banreservas1/proyectos-banreservas/devops/templates:SemVer01"
  variables:
    COMMIT_MERGE_REQ_URL: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/commits/$CI_COMMIT_SHA/merge_requests"
   # HOME: "$CI_PROJECT_DIR"
  before_script:
  - PS4='+ $(date +"%Y-%m-%d %T.%3N")\011'
  - set -x
  - git config --global --add safe.directory "$CI_PROJECT_DIR"
  - git config --global --add safe.directory '*'
  - export SSH_DIR="$CI_PROJECT_DIR/.ssh"
  - mkdir -p "$SSH_DIR"
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > "$SSH_DIR/id_rsa"
  - chmod 600 "$SSH_DIR/id_rsa"
  - ssh-keyscan gitlab.com >> "$SSH_DIR/known_hosts"
  - chmod 644 "$SSH_DIR/known_hosts"
  - eval $(ssh-agent -s)
  - ssh-add "$SSH_DIR/id_rsa"
  script:
    - echo Inicio
    - |
      merge_req=$(curl -s --header "PRIVATE-TOKEN: $GROUP_ACCESS_TOKEN" $COMMIT_MERGE_REQ_URL)
    - MR_BRANCH_NAME=$(echo $merge_req | jq -r '.[0].source_branch')
    - TAG=$(get-semver.sh $MR_BRANCH_NAME 2>>/dev/null)
    - set-semver.sh $MR_BRANCH_NAME 2>>/dev/null
    - git remote set-url origin "git@gitlab.com:$CI_PROJECT_PATH.git"
    - git config user.email "$GITLAB_USER_EMAIL"
    - git config user.name "$GITLAB_USER_NAME"
    - git tag -d $TAG || true
    #- git push origin :refs/tags/$TAG || true
    - git tag -a $TAG -m "Tagging version $TAG for merge request $MR_BRANCH_NAME"
    # - git push origin --tags
    #- GIT_SSH_COMMAND="ssh -i $SSH_DIR/id_rsa -o UserKnownHostsFile=$SSH_DIR/known_hosts" git push origin --tags
    - GIT_SSH_COMMAND="ssh -i $SSH_DIR/id_rsa -o UserKnownHostsFile=$SSH_DIR/known_hosts" git push origin $TAG -o ci.skip
    - echo -e "\e[44m Rollback=$TAG                                   \e[0m"
    - echo "TAG_VERSION=$TAG" >> TAG.env
  artifacts:
    reports:
      dotenv: TAG.env
  only:
    - main
  tags:
    - aks-runner  

