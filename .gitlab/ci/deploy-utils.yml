.rewrite_variables: &rewrite_variables
  before_script:
    - apk update && apk add --no-cache curl git bash openssh-client jq
    - mkdir -p ~/.ssh
    - echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - eval `ssh-agent -s`
    - ssh-add
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - rm -rf /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT}) || true
    - git clone -b "main" git@gitlab.com:${PATH_AUTOMATION_DEPLOYMENT}.git /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})
    - git config --global --add safe.directory '*'
    - git remote set-url origin ${PRIVATE_ACCESS_REPO}
    - git checkout ${REPO_BRANCH_NAME}
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git config --global user.name "$GITLAB_USER_NAME"
    - chmod 777 /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/ -R

variables:
  PATH_CONFIG: "deploy"
  PATH_FILES: "uploadfile"
  VERSION_FILE: "version.json"
  BASE_DIR: "local"

deploy-dev:
  stage: deploy-dev
  environment: 
    name: dev
  only:
    - main
    - /^hotfix\//
  <<: *rewrite_variables
  script:
    - echo ${CI_ENVIRONMENT_NAME}
    - |
        if [ -f "$VERSION_FILE" ]; then 
            echo "version.json found."
            cat $VERSION_FILE
        else 
            echo "version.json not found!"
            exit 1
        fi
    - |
        SCRIPT_PATH="/tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/scripts/deploy_files_utils.sh"
        
        find "$BASE_DIR" -type f -name "*.js" -exec dirname {} \; | sort -u | while read -r carpeta; do
        echo "🚀 Procesando carpeta: $carpeta"
        json=$(bash "$SCRIPT_PATH" "$carpeta" "$DOMAIN")

        echo "📤 Enviando archivos a carpeta: ${carpeta#local/}"

          echo "📤 JSON generado:"
          echo "$json"
          PATH_NODE="$PATH_FILES"

          response=$(curl --insecure -X POST -d "$json" -H "Content-Type:application/json" -H "_user:${DATAPOWER_USER}" -H "_pass:${DATAPOWER_PASS}" -H "_ip_dp:${DATAPOWER_URL}" "$NODE_URL/$PATH_NODE");
          
          echo "📥 Respuesta:"
          echo "$response";
        done
  needs:
    - build
  tags:    
    - aks-runner  

