.rewrite_variables: &rewrite_variables
  before_script:
    #- ENVIRONMENT="DEV"
    - export ENVIRONMENT_="DEV"
    - apk update && apk add --no-cache curl git bash openssh-client
    - HEADER_USER="_user:${DATAPOWER_USER}"
    - HEADER_PASS="_pass:${DATAPOWER_PASS}"
    - HEADER_URL="_ip_dp:${DATAPOWER_URL}"
    - CONTENT_TYPE="Content-Type:application/json"
    - mkdir -p ~/.ssh
    - echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - eval `ssh-agent -s`
    - ssh-add
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - cat ~/.ssh/id_rsa
    #- git clone -b "main" git@gitlab.banreservas.com:${PATH_AUTOMATION_DEPLOYMENT}.git /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})
    - git clone -b "main" git@gitlab.com:${PATH_AUTOMATION_DEPLOYMENT}.git /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})
    - git config --global --add safe.directory '*'
    - git remote set-url origin ${PRIVATE_ACCESS_REPO}
    - git checkout ${REPO_BRANCH_NAME}
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git config --global user.name "$GITLAB_USER_NAME"
    - chmod 777 /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/ -R

deploy-servicio-dev:
  stage: deploy-dev
  environment: 
    name: dev
  only:
    - main
    - /^hotfix\//
  <<: *rewrite_variables
  script:
    - echo "Deploying the project... Deploy Servicio"
    - echo ${ENVIRONMENT_}
    - json=$(bash /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/scripts/deploy_service.sh)
    - echo ${json}
    - response=$(curl --insecure -X POST -d "$json" -H "$CONTENT_TYPE" -H "$HEADER_USER" -H "$HEADER_PASS" -H "$HEADER_URL" "$NODE_URL/config");
    - echo "$response";
  needs:
    - version
    - build
  tags:    
    - aks-runner  


deploy-metodo-dev:
  stage: deploy-dev
  environment: 
    name: dev
  rules:
    - if: "$CI_COMMIT_BRANCH =~ /^(main)$/"
      changes:
        - "!config/DEV.json"
        - "!config/QA.json"
        - "!config/PDN.json"
        - "!config/config.json"
        - "**/config/*.json"
        - "**/js/*.{js,xsl}"
  <<: *rewrite_variables
  script:
    - echo "Deploying the project... Deploy Metodo"
    - COMMIT_BEFORE_SHA="$(git rev-parse HEAD~1)";
    - COMMIT_SHA="$(git rev-parse HEAD~0)";
    - echo "Cambios en los Metodos del servicio";
    - CHANGES_GIT=$(git diff --name-only  "$COMMIT_BEFORE_SHA" "$COMMIT_SHA" | xargs -I % realpath --relative-to=. %)
    - CHANGES=$(echo "$CHANGES_GIT" | grep -Eo '(^[^\/]+[^\/])' | sort -u)
    - echo "$CHANGES"
    - if [ -z "$CHANGES" ]; then
    - exit
    - fi
    - json=$(bash /tmp/$(basename ${PATH_AUTOMATION_DEPLOYMENT})/scripts/deploy_metodo.sh  $CHANGES)
    - response=$(curl --insecure -X POST -d "$json" -H "$HEADER1" -H "$HEADER_USER" -H "$HEADER_PASS" -H "$HEADER_URL" "$NODE_URL/deploy");
    - echo "$response";
  needs:
    - version
    - build
  tags:    
    - aks-runner  
    
