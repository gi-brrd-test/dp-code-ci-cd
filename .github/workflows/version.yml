name: Version

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: [self-hosted, aks-runner]
    outputs:
      tag: ${{ steps.semver.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Convenciones de branch → tipo de bump:
          # hotfix/** → patch  (v1.0.0 → v1.0.1)
          # fix/**    → patch
          # feat/**   → minor  (v1.0.0 → v1.1.0)
          # major/**  → major  (v1.0.0 → v2.0.0)
          # Si el MR viene de hotfix/ → patch automático
          default_bump: patch
          tag_prefix: v

      - name: Show generated tag
        run: echo "Tag generado → ${{ steps.semver.outputs.new_tag }}"
