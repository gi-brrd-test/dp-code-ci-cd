name: Setup Deploy
description: Clone dp-code-ci-cd scripts and configure git

inputs:
  path_automation_deployment:
    required: true
  git_user_email:
    required: true
  git_user_name:
    required: true
  repo_branch_name:
    required: false
    default: ''
  git_tag:
    required: false
    default: ''
  token:
    required: true

runs:
  using: composite
  steps:
    - name: Clone automation scripts
      shell: bash
      env:
        REPO: ${{ inputs.path_automation_deployment }}
        TOKEN: ${{ inputs.token }}
      run: |
        rm -rf /tmp/dp-code-ci-cd
        git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${REPO}.git" /tmp/dp-code-ci-cd

    - name: Configure git
      shell: bash
      env:
        GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        GIT_USER_NAME: ${{ inputs.git_user_name }}
        REPO_BRANCH_NAME: ${{ inputs.repo_branch_name }}
        GIT_TAG: ${{ inputs.git_tag }}
      run: |
        git config --global --add safe.directory '*'
        git config --global user.email "$GIT_USER_EMAIL"
        git config --global user.name "$GIT_USER_NAME"
        if [ -n "$GIT_TAG" ]; then
          git fetch --tags
          git checkout "$GIT_TAG"
        elif [ -n "$REPO_BRANCH_NAME" ]; then
          git checkout "$REPO_BRANCH_NAME" || true
        fi
